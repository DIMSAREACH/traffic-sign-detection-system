<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function(){
        var d = document.documentElement, g = function(k,f){try{return JSON.parse(localStorage.getItem(k))}catch(e){return f}};
        var t = localStorage.getItem('theme');
        if(t) d.setAttribute('data-theme', t);
        var lang = g('settings.language','en');
        if(lang) d.setAttribute('data-lang', lang);
        var fs = g('settings.fontSize','medium');
        if(fs) d.setAttribute('data-fontsize', fs);
        var hc = g('settings.highContrast',false);
        d.setAttribute('data-contrast', String(!!hc));
        var rm = g('settings.reduceMotion',false);
        d.setAttribute('data-reduce-motion', String(!!rm));
        var cm = g('settings.compact',false);
        d.setAttribute('data-compact', String(!!cm));
      })();
    </script>
    <title>Traffic Violation Expert System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@300;400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
